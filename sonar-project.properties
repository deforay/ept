sonar.projectKey=ept-nrl-saccl
sonar.projectName=ePT (NRL-SACCL ePT)
sonar.sources=.
sonar.sourceEncoding=UTF-8

# ---------------------------------------------------------------------------
# Exclusions
#
# We exclude vendored / third-party code from analysis. We do not own these
# files, will not patch them, and any "bugs" reported in them are noise.
# ---------------------------------------------------------------------------

sonar.exclusions=\
    public/assets/**,\
    public/js/lib/**,\
    public/js/**/*.min.js,\
    library/Zend/**,\
    library/PhpOffice/**,\
    vendor/**,\
    node_modules/**,\
    **/*.min.js,\
    **/*.min.css,\
    **/*.bundle.js,\
    **/*.pkgd.js,\
    application/modules/*/views/scripts/**/*.phtml.bak,\
    run-once/_archive/**,\
    docs/**

# Don't run security analysis on vendored / generated code either.
sonar.security.sources.exclusions=${sonar.exclusions}

# Tests aren't currently wired up; mark coverage scope explicitly so the
# 0% coverage doesn't gate the build.
sonar.coverage.exclusions=**/*

# Duplications are expected in:
#   - View templates (translated copies of the same form, etc.)
#   - Country-specific report layouts under scheduled-jobs/report-layouts/
#     (per-country PDF report variants for malawi/zimbabwe/myanmar/jamaica/
#     ghana/default/mtbept — intentionally separate files per regulatory
#     and branding requirements)
#   - Certificate templates (per-country / per-program)
# CPD-exclude these, but keep them in general analysis so real bugs still
# get flagged.
sonar.cpd.exclusions=\
    application/**/views/**,\
    public/assets/**,\
    scheduled-jobs/report-layouts/**,\
    scheduled-jobs/certificate-templates/**
