name: PHP Quality

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: php-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: PHPStan, CS-Fixer, Composer Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PHP_VERSION: '8.4'
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f  # v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: gd, zip, pdo, json, curl, gettext, openssl, fileinfo, sodium, zlib, intl, bcmath, mbstring, dom, xml, simplexml, ctype, iconv
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-dev-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-dev-
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          composer install \
            --prefer-dist \
            --no-progress \
            --no-interaction

      - name: PHPStan
        run: composer phpstan

      - name: PHP-CS-Fixer (dry-run)
        run: composer cs-check

      - name: Composer Audit
        run: composer audit
