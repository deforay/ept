[production]

domain = http://ept.com/
timezone = "UTC"
locale ="en_US"

whatsapp.phoneId = "";
whatsapp.token = "";

php.path = "/usr/bin/php"
libreoffice.path = "/usr/bin/libreoffice"

phpSettings.display_startup_errors = 0
phpSettings.display_errors = 1
includePaths.library = APPLICATION_PATH "/../library"
bootstrap.path = APPLICATION_PATH "/Bootstrap.php"
bootstrap.class = "Bootstrap"
appnamespace = "Application"
resources.frontController.controllerDirectory = APPLICATION_PATH "/controllers"
resources.frontController.params.displayExceptions = 0
resources.view[] =
resources.layout.layoutPath = APPLICATION_PATH "/layouts/scripts/"
resources.view.helperPath.Pt_Helper_View = APPLICATION_PATH "/../library/Pt/Helper/View/"

autoloaderNamespaces[] = "Pt"

resources.frontController.plugins.PreSetter = "Pt_Plugins_PreSetter"

resources.db.adapter = PDO_MYSQL
resources.db.params.host = 127.0.0.1
resources.db.params.username = root
resources.db.params.password = zaq12345
resources.db.params.dbname = ept
resources.db.params.charset = "utf8"


resources.frontController.moduleDirectory = APPLICATION_PATH "/modules"

email.fromName = "ePT System"
email.limits.perAttachmentMb = 15
email.limits.totalAttachmentsMb = 22
email.host=smtp.gmail.com
email.config.port=587
email.config.username=
email.config.password=
email.config.ssl=tls
email.config.auth=login

; Dev mail trap. Leave unset on real instances. On a dev/test box (especially
; after cloning a live DB, which ships SMTP creds in global_config), set this
; to a local mail-catcher DSN so outgoing mail never reaches real recipients:
;   email.devTrapDsn = "smtp://127.0.0.1:1025"
; Any non-empty value that is not a parseable smtp:// DSN blocks sending entirely.
; Recommended trap: Mailpit (UI at http://localhost:8025). Ubuntu install:
;   sudo bash < <(curl -sL https://raw.githubusercontent.com/axllent/mailpit/develop/install.sh)
;email.devTrapDsn =

; Bounce inbox (IMAP). Leave email.bounce.host empty to disable the bounce
; processor (bin/process-bounces.php). See application.ini for full notes.
; Point at your outbound mailbox (same-inbox capture, read-only safe) OR a
; dedicated bounces mailbox (optionally markSeen=yes / moveTo=Processed).
;email.bounce.host     =
;email.bounce.port     = 993
;email.bounce.username =
;email.bounce.password =
;email.bounce.ssl      = ssl
;email.bounce.folder   = INBOX
;email.bounce.markSeen = no
;email.bounce.moveTo   =

; put a random string below
security.salt = ''


[staging : production]
locale ="en_US"
[testing : production]
phpSettings.display_startup_errors = 1
phpSettings.display_errors = 1
locale ="en_US"
[development : production]

domain = http://ept.local
locale ="en_US"
phpSettings.display_startup_errors = 1
phpSettings.display_errors = 1
resources.frontController.params.displayExceptions = 1
