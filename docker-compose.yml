services:
  app:
    build: .
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      - APPLICATION_ENV=production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=ept_secret
      - DB_NAME=ept
      - APP_DOMAIN=${APP_DOMAIN:-http://localhost/}
    volumes:
      - uploads:/var/www/ept/public/uploads
      - logs:/var/www/ept/logs
      - backups:/var/www/ept/backups
      - downloads:/var/www/ept/downloads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=ept_secret
      - MYSQL_DATABASE=ept
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --sql-mode=
      --innodb-strict-mode=0
      --max-connect-errors=10000
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./docker/certbot/conf:/etc/nginx/ssl:ro
      - ./docker/certbot/www:/var/www/certbot:ro
    environment:
      - APP_HOSTNAME=${APP_HOSTNAME:-localhost}
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - ssl

  certbot:
    image: certbot/certbot
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
    profiles:
      - ssl

volumes:
  mysql_data:
  uploads:
  logs:
  backups:
  downloads:
